<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청서</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 16px;
      min-height: 100vh;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: var(--tg-theme-text-color, #000);
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--tg-theme-hint-color, #888);
    }

    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--tg-theme-hint-color, #ddd);
      border-radius: 10px;
      font-size: 16px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--tg-theme-button-color, #2481cc); }

    .image-box {
      width: 100%;
      height: 140px;
      border: 2px dashed var(--tg-theme-hint-color, #ccc);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      position: relative;
      overflow: hidden;
    }

    .image-box span { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-top: 6px; }
    .image-box svg { opacity: 0.4; }

    #image-preview {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    #image-input { display: none; }

    .required { color: #e74c3c; margin-left: 2px; }

    .error-msg {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>📋 신청서</h2>

  <div class="field">
    <label>이름 <span class="required">*</span></label>
    <input type="text" id="name" placeholder="홍길동">
    <div class="error-msg" id="name-err">이름을 입력해주세요.</div>
  </div>

  <div class="field">
    <label>주소 <span class="required">*</span></label>
    <input type="text" id="address" placeholder="서울시 강남구 테헤란로 123">
    <div class="error-msg" id="address-err">주소를 입력해주세요.</div>
  </div>

  <div class="field">
    <label>연락처 <span class="required">*</span></label>
    <input type="tel" id="phone" placeholder="010-1234-5678">
    <div class="error-msg" id="phone-err">연락처를 입력해주세요.</div>
  </div>

  <div class="field">
    <label>이미지 <span style="color:var(--tg-theme-hint-color,#888);font-weight:400">(선택)</span></label>
    <div class="image-box" id="image-box">
      <img id="image-preview" alt="미리보기">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span id="image-label">탭하여 이미지 선택</span>
    </div>
    <input type="file" id="image-input" accept="image/*">
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // URL에서 group chat_id 추출
    const urlParams = new URLSearchParams(window.location.search);
    const groupChatId = urlParams.get('chat_id');

    // 이미지 선택
    document.getElementById('image-box').addEventListener('click', () => {
      document.getElementById('image-input').click();
    });

    let imageBase64 = null;

    document.getElementById('image-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        imageBase64 = ev.target.result;
        const preview = document.getElementById('image-preview');
        preview.src = imageBase64;
        preview.style.display = 'block';
        document.getElementById('image-label').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // 유효성 검사
    function validate() {
      let valid = true;

      ['name', 'address', 'phone'].forEach(id => {
        const val = document.getElementById(id).value.trim();
        const err = document.getElementById(id + '-err');
        if (!val) {
          err.style.display = 'block';
          valid = false;
        } else {
          err.style.display = 'none';
        }
      });

      return valid;
    }

    // 메인 버튼
    tg.MainButton.setText('신청하기').show();
    tg.MainButton.onClick(() => {
      if (!validate()) return;

      const payload = {
        name:      document.getElementById('name').value.trim(),
        address:   document.getElementById('address').value.trim(),
        phone:     document.getElementById('phone').value.trim(),
        image:     imageBase64 || null,
        chat_id:   groupChatId ? parseInt(groupChatId) : null,
      };

      tg.MainButton.showProgress();
      tg.sendData(JSON.stringify(payload));
    });
  </script>
</body>
</html>
